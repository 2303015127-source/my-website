<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tinov Beauty – Reset Password</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>"/>
  
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  
  <style>
:root {
  --pink-primary: #E8748A;
  --pink-light:   #F9D4DB;
  --pink-soft:    #FFF0F2;
  --pink-deep: #C9506A;
  --white: #FFFFFF;
  --gray-200: #EEEEEE;
  --gray-600: #757575;
  --gray-800: #3A3A3A;
  --dark: #1E1E1E;
  --font-display: 'Cormorant Garamond', serif;
  --font-body: 'Plus Jakarta Sans', sans-serif;
  --radius-lg: 24px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #FFEBEF 0%, #F9D4DB 100%);
  padding: 20px;
  -webkit-font-smoothing: antialiased;
}

.login-card-container {
  width: 100%;
  max-width: 440px;
  background: var(--white);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: 0 20px 40px rgba(232, 116, 138, 0.12);
}

.login-card-header {
  background: linear-gradient(135deg, #FFB7C5 0%, var(--pink-primary) 100%);
  padding: 38px 32px;
  text-align: center;
}

.login-card-icon-circle {
  width: 48px;
  height: 48px;
  background: rgba(255, 255, 255, 0.3);
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 14px;
  color: var(--white);
}
.login-card-icon-circle svg {
  width: 22px;
  height: 22px;
  fill: currentColor;
}

.login-card-title {
  font-family: var(--font-display);
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 2px;
  letter-spacing: 0.02em;
}
.login-card-sub {
  font-size: .85rem;
  color: rgba(255, 255, 255, 0.9);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  font-weight: 500;
}

.login-card-body {
  padding: 40px 36px 36px;
}

.form-group { margin-bottom: 24px; }
.form-label {
  display: block;
  font-size: .8rem;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--gray-800);
  letter-spacing: 0.03em;
}

.form-input {
  width: 100%;
  padding: 13px 14px; 
  border: 1.5px solid var(--gray-200);
  border-radius: 10px;
  font-family: var(--font-body);
  font-size: .9rem;
  color: var(--dark);
  outline: none;
  background-color: #fafafa;
  transition: border-color .2s, box-shadow .2s, background-color .2s;
}
.form-input:focus {
  background-color: var(--white);
  border-color: var(--pink-primary);
  box-shadow: 0 0 0 3px rgba(232,116,138,.1);
}

.form-error {
  display: none;
  font-size: .78rem;
  color: #dc2626;
  margin-top: 5px;
}
.form-error.show { display: block; }

.btn-login {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--pink-primary), var(--pink-deep));
  color: white;
  border: none;
  border-radius: 100px;
  font-family: var(--font-body);
  font-size: .92rem;
  font-weight: 700;
  cursor: pointer;
  transition: all .25s;
  box-shadow: 0 4px 14px rgba(232,116,138,0.25);
  letter-spacing: 0.02em;
}
.btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,116,138,0.4); }
.btn-login:disabled { opacity: .65; cursor: not-allowed; transform: none; }

.back-to-login {
  display: block;
  text-align: center;
  margin-top: 20px;
  font-size: .88rem;
  color: var(--pink-primary);
  text-decoration: none;
  font-weight: 600;
  transition: color 0.2s;
}
.back-to-login:hover { color: var(--pink-deep); }

.spinner {
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,.35);
  border-top-color: white;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: none;
}
.btn-login.loading .spinner { display: block; }
.btn-login.loading .btn-text { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="login-card-container">
  <div class="login-card-header">
    <div class="login-card-icon-circle">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12C22 17.5228 17.5228 22 12 22ZM12 20C16.4183 20 20 16.4183 20 12C20 7.58172 16.4183 4 12 4C7.58172 4 4 7.58172 4 12C4 16.4183 7.58172 20 12 20ZM11 6H13V12H11V6ZM11 14H13V16H11V14Z"></path></svg>
    </div>
    <h2 class="login-card-title">Reset Password</h2>
    <div class="login-card-sub">Masukkan Email Admin Anda</div>
  </div>

  <div class="login-card-body">
    <div id="alertBox" style="display:none;padding:12px 16px;border-radius:10px;font-size:.85rem;margin-bottom:18px;"></div>

    <div class="form-group">
      <label class="form-label" for="emailInput">EMAIL ADMINISTRATOR</label>
      <input type="email" id="emailInput" class="form-input" placeholder="admin@tinovbeauty.com" autocomplete="email"/>
      <div class="form-error" id="emailError">Masukkan email yang valid.</div>
    </div>

    <button class="btn-login" id="resetBtn" type="button">
      <div class="spinner"></div>
      <span class="btn-text">Kirim Tautan Reset</span>
    </button>

    <a href="login.html" class="back-to-login">Kembali ke Halaman Login</a>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCkvyqtIRlRtGCbyuny0drmALLWFTkhzQQ",
    authDomain: "tinovbeauty.firebaseapp.com",
    databaseURL: "https://tinovbeauty-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "tinovbeauty",
    storageBucket: "tinovbeauty.firebasestorage.app",
    messagingSenderId: "30816292453",
    appId: "1:30816292453:web:0786c87ddf8df86204808c",
    measurementId: "G-WLFCVJ1WLX"
  };
  
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const resetBtn = document.getElementById('resetBtn');
  const emailInput = document.getElementById('emailInput');
  const alertBox = document.getElementById('alertBox');

  resetBtn.addEventListener('click', async () => {
    alertBox.style.display = 'none';
    document.getElementById('emailError').classList.remove('show');
    
    const emailValue = emailInput.value.trim();
    if (!emailValue || !/\S+@\S+\.\S+/.test(emailValue)) {
      document.getElementById('emailError').classList.add('show');
      return;
    }

    resetBtn.classList.add('loading');
    resetBtn.disabled = true;

    try {
      // PERBAIKAN: Menggunakan metode kirim email standar Firebase tanpa melemparkan parameter url lokal eksternal
      await sendPasswordResetEmail(auth, emailValue);
      alertBox.textContent = 'Tautan pengaturan ulang kata sandi berhasil dikirim! Silakan periksa kotak masuk atau folder spam email Anda.';
      alertBox.style.display = 'block';
      alertBox.style.background = '#d1fae5';
      alertBox.style.color = '#065f46';
      alertBox.style.borderLeft = '4px solid #10b981';
    } catch (err) {
      alertBox.textContent = 'Gagal mengirim email. Pastikan email Anda sudah terdaftar di Firebase Authentication.';
      alertBox.style.display = 'block';
      alertBox.style.background = '#fee2e2';
      alertBox.style.color = '#dc2626';
      alertBox.style.borderLeft = '4px solid #dc2626';
    } finally {
      resetBtn.classList.remove('loading');
      resetBtn.disabled = false;
    }
  });

  emailInput.addEventListener('keydown', e => { if(e.key==='Enter') resetBtn.click(); });
</script>
</body>
</html>
